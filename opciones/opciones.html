<!DOCTYPE html>
<html lang="es" data-theme="samjoko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../assets/themes.css">
  <link rel="stylesheet" href="../assets/comun.css">
  <link rel="stylesheet" href="opciones.css">
  <title></title>
</head>
<body>
  <div id="contenedor">
    <header id="encabezado">
      <div id="marca">
        <div id="infoMarca">
          <h1></h1>
        </div>
        <div id="iconoMarca">
          <img src="../assets/icons/Samjoko-Icono_Circular_128px.png" alt="Samjoko" width="56" height="56">
        </div>
      </div>
      <h2 id="subtituloPagina"></h2>
    </header>

    <section id="seccionCarpeta">
      <div id="cabeceraSeccion">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="22" height="22" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 0 1 4.5 9.75h15A2.25 2.25 0 0 1 21.75 12v.75m-8.69-6.44-2.12-2.12a1.5 1.5 0 0 0-1.061-.44H4.5A2.25 2.25 0 0 0 2.25 6v12a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9a2.25 2.25 0 0 0-2.25-2.25h-5.379a1.5 1.5 0 0 1-1.06-.44Z" />
        </svg>
        <h3></h3>
      </div>
      <p id="descripcionCarpeta"></p>
      <button id="botonSeleccionar">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="18" height="18" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 10.5v6m3-3H9m4.06-7.19-2.12-2.12a1.5 1.5 0 0 0-1.061-.44H4.5A2.25 2.25 0 0 0 2.25 6v12a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9a2.25 2.25 0 0 0-2.25-2.25h-5.379a1.5 1.5 0 0 1-1.06-.44Z" />
        </svg>
        <span></span>
      </button>
      <div id="infoCarpeta" class="oculto">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="22" height="22" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
        </svg>
        <div id="detalleCarpeta">
          <span id="etiquetaCarpeta"></span>
          <span id="nombreCarpeta"></span>
        </div>
        <button id="botonLimpiar" aria-label="">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="18" height="18" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </section>

    <footer id="piePagina">
      <p id="textoCopyright"></p>
      <p id="textoApoyo">
        <span></span>
        <a href="https://ko-fi.com/harpopan" target="_blank" rel="noopener noreferrer">ko-fi.com/harpopan</a>
      </p>
    </footer>
  </div>

  <div id="zonaToast" aria-live="polite"></div>

  <script src="../base-datos.js"></script>
  <script src="opciones.js"></script>
</body>
</html>
